<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weinkeller Management</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Tesseract.js for Browser Label OCR -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.2s ease-out forwards;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen font-sans antialiased selection:bg-stone-200">

  <div id="app-container" class="max-w-5xl mx-auto p-4 sm:p-6 md:p-8 hidden">
    <!-- Navigation Bar -->
    <div id="nav-zone"></div>

    <!-- Main Views -->
    <main>
      <!-- Cellar / Dashboard View -->
      <div id="view-dashboard" class="view-pane hidden">
        <div class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-4 rounded-xl border border-gray-100 shadow-sm">
          <div class="flex-1 min-w-[240px] relative">
            <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-gray-400"></i>
            <input type="text" id="search-input" oninput="window.app.handleSearch(this.value)" placeholder="Wein oder Weingut …" class="w-full bg-gray-50 border border-gray-200 rounded-lg pl-9 pr-4 py-2 text-sm outline-none focus:border-gray-400 transition-colors">
          </div>
          <div id="filter-buttons" class="flex flex-wrap gap-2"></div>
          <button onclick="window.app.toggleAddModal(true)" class="flex items-center justify-center gap-1.5 px-4 py-2 rounded-lg text-sm font-semibold text-white bg-[#B83232] hover:opacity-90 transition-opacity shrink-0">
            <i data-lucide="plus" class="w-4 h-4"></i>
            <span id="lbl-add-wine-btn">Wein hinzufügen</span>
          </button>
        </div>

        <div id="stats-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
          <div class="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
            <h3 id="lbl-chart-types" class="text-sm font-semibold text-gray-900 mb-3">Weinarten</h3>
            <div class="flex items-center gap-6">
              <div class="w-28 h-28 shrink-0 relative"><canvas id="pieChartCanvas"></canvas></div>
              <div id="pie-legend" class="flex-1 space-y-1.5"></div>
            </div>
          </div>
          <div class="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
            <h3 id="lbl-chart-regions" class="text-sm font-semibold text-gray-900 mb-3">Top Anbaugebiete</h3>
            <div id="bar-chart-container" class="h-28 relative"><canvas id="barChartCanvas"></canvas></div>
          </div>
        </div>

        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4 pb-3 border-b border-gray-100">
          <div id="wines-count-info" class="text-sm font-semibold text-gray-700"></div>
          <div id="sort-bar-zone"></div>
        </div>

        <div id="wine-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3"></div>
        <div id="empty-state-zone" class="text-center py-12 text-sm text-gray-400 hidden"></div>
      </div>

      <!-- Archive View -->
      <div id="view-archive" class="view-pane hidden"></div>

      <!-- Detail View -->
      <div id="view-detail" class="view-pane bg-white border border-gray-100 rounded-xl p-6 shadow-sm hidden"></div>
    </main>

    <!-- Dynamic Modal Container -->
    <div id="modal-zone"></div>

    <!-- Notification Toast Container -->
    <div id="toast-zone" class="hidden"></div>
  </div>

  <!-- Application Logic -->
  <script src="app.js"></script>
</body>
</html>
