<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weinkeller Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white min-h-screen">

    <div id="app-container" class="px-5 pt-4 pb-10 max-w-[920px] mx-auto hidden">
        <div id="nav-zone"></div>
        
        <!-- DASHBOARD (AKTIVER KELLER) -->
        <div id="view-dashboard" class="view-pane hidden">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <p id="lbl-my-cellar" class="text-xs text-gray-400 mb-0.5"></p>
                    <h1 id="lbl-overview" class="text-xl font-bold text-gray-900"></h1>
                </div>
                <div class="flex items-center gap-2">
                    <div class="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-lg px-3 py-1.5">
                        <i data-lucide="search" class="text-gray-400 w-3.5 h-3.5"></i>
                        <input id="search-input" oninput="window.app.handleSearch(this.value)" class="text-sm bg-transparent outline-none text-gray-700 w-40">
                    </div>
                    <button onclick="window.app.toggleAddModal(true)" id="btn-add-wine" class="flex items-center gap-1.5 text-sm font-semibold text-white px-3.5 py-1.5 rounded-lg transition-opacity hover:opacity-90 bg-[#B83232]">
                        <i data-lucide="plus" class="w-3.5 h-3.5"></i> <span id="lbl-add-wine-btn"></span>
                    </button>
                </div>
            </div>

            <div id="filter-buttons" class="flex gap-2 flex-wrap mb-4"></div>

            <div id="stats-grid" class="grid grid-cols-4 gap-2.5 mb-4"></div>

            <div class="grid gap-2.5 mb-5 grid-cols-[210px_1fr]">
                <div class="bg-white border border-gray-100 rounded-xl p-4 flex flex-col justify-between">
                    <p id="lbl-chart-types" class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3"></p>
                    <div class="relative w-[130px] h-[130px] mx-auto">
                        <canvas id="pieChartCanvas"></canvas>
                    </div>
                    <div id="pie-legend" class="mt-3 space-y-1.5"></div>
                </div>
                <div class="bg-white border border-gray-100 rounded-xl p-4">
                    <p id="lbl-chart-regions" class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3"></p>
                    <div id="bar-chart-container" class="h-[195px] w-full">
                        <canvas id="barChartCanvas"></canvas>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between mb-2.5 gap-3 flex-wrap">
                <p id="wines-count-info" class="text-xs font-semibold text-gray-400 uppercase tracking-wider whitespace-nowrap"></p>
                <div id="sort-bar-zone"></div>
            </div>

            <div id="wine-grid" class="grid grid-cols-3 gap-2.5"></div>
            <div id="empty-state-zone" class="py-12 text-center text-sm text-gray-400 hidden"></div>
        </div>

        <!-- ARCHIV VIEW (FÜR LEERE FLASCHEN) -->
        <div id="view-archive" class="view-pane hidden">
            <div class="mb-4">
                <p id="lbl-archive-sub" class="text-xs text-gray-400 mb-0.5"></p>
                <h1 id="lbl-archive-title" class="text-xl font-bold text-gray-900"></h1>
            </div>
            
            <div class="flex items-center justify-between mb-2.5 gap-3 flex-wrap">
                <p id="archive-count-info" class="text-xs font-semibold text-gray-400 uppercase tracking-wider whitespace-nowrap"></p>
            </div>

            <div id="archive-grid" class="grid grid-cols-3 gap-2.5"></div>
            <div id="archive-empty-zone" class="py-12 text-center text-sm text-gray-400 hidden"></div>
        </div>
        
        <div id="view-detail" class="view-pane hidden"></div>

        <div id="view-placeholder" class="view-pane hidden flex flex-col items-center justify-center py-24 text-center gap-3">
            <div id="placeholder-icon" class="text-4xl"></div>
            <h2 id="placeholder-title" class="text-lg font-semibold text-gray-700"></h2>
            <p id="placeholder-desc" class="text-sm text-gray-400 max-w-xs"></p>
        </div>
        
        <div id="modal-zone"></div>
        <div id="toast-zone" class="hidden"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
